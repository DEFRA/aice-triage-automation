# To set up Sonar cloud follow https://github.com/DEFRA/cdp-documentation/blob/main/howto/sonarcloud.md
# Update properties in this file as per the howto instructions
# Uncomment properties in this .github/workflows/check-pull-request.yml
# Uncomment properties in this .github/workflows/publish.yml
# Uncomment properties in this .github/workflows/publish-hotfix.yml

sonar.projectKey=DEFRA_aice-triage-automation
sonar.organization=defra

sonar.links.homepage=https://github.com/DEFRA/aice-triage-automation
sonar.links.ci=https://github.com/DEFRA/aice-triage-automation/actions
sonar.links.scm=https://github.com/DEFRA/aice-triage-automation
sonar.links.issue=https://github.com/DEFRA/aice-triage-automation/issues

sonar.sources=src/
sonar.tests=tests/
sonar.test.inclusions=tests/**/*.test.js

sonar.javascript.lcov.reportPaths=./coverage/lcov.info
